<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroNet Logistics & IoT Dashboard</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .role-selector {
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            font-size: 18px;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
        }

        .btn {
            background-color: var(--accent-blue);
            color: var(--bg-dark);
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 6px;
            outline: none;
        }

        .badge {
            background-color: rgba(74, 222, 128, 0.1);
            color: var(--accent-green);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AeroNet Supply Chain & Telemetry</h1>
        <select id="roleSelect" class="role-selector" onchange="switchRole()">
            <option value="Supplier">Role: Supplier View</option>
            <option value="Inspector">Role: Inspector View</option>
            <option value="Admin">Role: Security Admin</option>
        </select>
    </header>

    <div class="grid">
        <div class="card" id="personnelCard" style="display:none;">
            <h2>Authorized Supply Chain Personnel (SQL)</h2>
            <p style="font-size:12px; color:var(--text-muted);">Pulled directly from Neon Cloud Postgres</p>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Clearance</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Live IoT Telemetry Stream (NoSQL)</h2>
            <p style="font-size:12px; color:var(--text-muted);">Pulled directly from MongoDB Atlas Cloud</p>
            <table>
                <thead>
                    <tr>
                        <th>Log ID</th>
                        <th>Sensor Device</th>
                        <th>Timestamp</th>
                        <th>Reading</th>
                    </tr>
                </thead>
                <tbody id="telemetryTableBody">
                    </tbody>
            </table>
        </div>

        <div class="card" id="actionCard" style="display:none;">
            <h2>Aero-Component Certification Sign-off</h2>
            <div class="form-group">
                <label>Component Item ID</label>
                <input type="text" id="formItemId" value="ITEM_551">
            </div>
            <div class="form-group">
                <label>Inspector Employee ID</label>
                <input type="text" id="formEmpId" value="EMP_002">
            </div>
            <button class="btn" onclick="submitCertification()">Approve & Sign Off Component</button>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = 'https://aeronet-supply-chain.onrender.com';

    // Core execution paths based on active role views
    async function switchRole() {
        const role = document.getElementById('roleSelect').value;
        const personnelCard = document.getElementById('personnelCard');
        const actionCard = document.getElementById('actionCard');

        if (role === 'Supplier') {
            personnelCard.style.display = 'none';
            actionCard.style.display = 'none';
        } else if (role === 'Inspector') {
            personnelCard.style.display = 'block';
            actionCard.style.display = 'block';
            await fetchUsers();
        } else if (role === 'Admin') {
            personnelCard.style.display = 'block';
            actionCard.style.display = 'none';
            await fetchUsers();
        }
    }

    // Call Neon Engine via Render API to fetch Personnel
    async function fetchUsers() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/users`);
            const users = await res.json();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            users.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td>${u.empid}</td>
                        <td>${u.full_name}</td>
                        <td>${u.jobrole}</td>
                        <td><span class="badge">Lvl ${u.accesslevel}</span></td>
                    </tr>
                `;
            });
        } catch (err) {
            console.error("Failed to pull PostgreSQL Users:", err);
        }
    }

    // Call MongoDB Atlas Engine via Render API to fetch IoT Telemetry
    async function fetchTelemetry() {
        try {
            const res = await fetch(`${BACKEND_URL}/api/telemetry`);
            const telemetry = await res.json();
            const tbody = document.getElementById('telemetryTableBody');
            tbody.innerHTML = '';

            telemetry.forEach(t => {
                tbody.innerHTML += `
                    <tr>
                        <td>${t.LogID}</td>
                        <td>${t.DeviceID}</td>
                        <td>${new Date(t.Timestamp).toLocaleTimeString()}</td>
                        <td style="color:#4ade80; font-weight:bold;">${t.Reading.Value} ${t.Reading.Unit}</td>
                    </tr>
                `;
            });
        } catch (err) {
            console.error("Failed to pull MongoDB Telemetry:", err);
        }
    }

    // Post data cross-cluster to log certifications and records
    async function submitCertification() {
        const itemID = document.getElementById('formItemId').value;
        const empID = document.getElementById('formEmpId').value;

        try {
            const response = await fetch(`${BACKEND_URL}/api/certify`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemID, empID, status: 'PASSED_SAFETY_AUDIT' })
            });

            const result = await response.json();
            alert(result.message);
        } catch (err) {
            alert("Error sending certification data to cloud infrastructure.");
        }
    }

    // Initial load configurations
    window.onload = () => {
        fetchTelemetry();
        switchRole();
    };
</script>
</body>
</html>
